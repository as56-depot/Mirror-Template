name: Weekly Upstream Sync

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  UPSTREAM_URL: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check if UPSTREAM_URL is set
        run: |
          if [[ "${{ env.UPSTREAM_URL }}" == "false" ]]; then
            echo "UPSTREAM_URL is still 'false'. This is likely the template repo. Stopping."
            exit 0
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Logic
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git remote add upstream ${{ env.UPSTREAM_URL }}
          git fetch upstream || { echo "Failed to fetch upstream"; exit 1; }

          git remote set-head upstream -a > /dev/null
          UPSTREAM_BRANCH=$(git symbolic-ref refs/remotes/upstream/HEAD | sed 's@^refs/remotes/upstream/@@')

          git checkout upstream/$UPSTREAM_BRANCH -- .
          
          mkdir -p .github/upstream
          mv .github/workflows/*.yml .github/upstream/ 2>/dev/null || true
          rm -rf .github/workflows
          
          git checkout HEAD -- .github/

          git add .
          if git diff --cached --exit-code --quiet; then
            echo "No changes to sync."
          else
            git commit -m "chore: sync from upstream $(date +'%Y-%m-%d')"
            git push origin main --force
            echo "Sync complete."
          fi
